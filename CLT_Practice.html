<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLT Practice Test</title>
<style>
body{font-family:Georgia,serif;background:#f5f0e8;color:#1a1a1a;margin:0;padding:0;}
button{cursor:pointer;font-family:Georgia,serif;}
.hidden{display:none!important;}

/* WELCOME */
#welcome{min-height:100vh;background:#1a2744;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;}
#welcome h1{color:#fff;font-size:2.4rem;margin-bottom:.5rem;}
#welcome .sub{color:rgba(255,255,255,.6);font-size:1rem;margin-bottom:2.5rem;}
.sec-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;max-width:700px;width:100%;margin-bottom:2rem;}
.sec-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:1.5rem;color:#fff;text-align:left;transition:all .2s;}
.sec-btn:hover{background:rgba(255,255,255,.18);border-color:#c9973a;transform:translateY(-2px);}
.sec-btn .snum{font-size:.68rem;font-weight:bold;letter-spacing:.1em;text-transform:uppercase;color:#c9973a;margin-bottom:.4rem;}
.sec-btn .stitle{font-size:1rem;margin-bottom:.2rem;}
.sec-btn .smeta{font-size:.78rem;color:rgba(255,255,255,.5);}
.big-btn{background:#c9973a;color:#1a2744;border:none;padding:.9rem 2.8rem;font-size:1rem;font-weight:bold;border-radius:8px;transition:all .2s;}
.big-btn:hover{background:#e8b85a;transform:translateY(-1px);}

/* TEST SCREEN */
#testscreen{min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:#1a2744;color:#fff;padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.secname{font-size:.68rem;font-weight:bold;letter-spacing:.1em;text-transform:uppercase;color:#c9973a;background:rgba(201,151,58,.15);padding:.25rem .75rem;border-radius:4px;}
.passname{font-size:.82rem;color:rgba(255,255,255,.62);font-style:italic;margin-left:.75rem;}
.topright{display:flex;align-items:center;gap:.75rem;}
.timer{font-size:.95rem;font-weight:bold;color:#fff;background:rgba(255,255,255,.12);padding:.32rem .85rem;border-radius:6px;min-width:5rem;text-align:center;}
.timer.warn{color:#ff9966;background:rgba(255,100,50,.2);}
.live-score{font-size:.82rem;color:#fff;background:rgba(255,255,255,.1);padding:.32rem .85rem;border-radius:6px;}
.live-score .ls-num{font-weight:bold;color:#c9973a;}
.pbar-outer{height:3px;background:rgba(0,0,0,.1);}
.pbar-inner{height:100%;background:#c9973a;transition:width .3s;}

.main-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;padding:1.5rem;max-width:1300px;margin:0 auto;width:100%;}
@media(max-width:800px){.main-grid{grid-template-columns:1fr;}}

.passage-box{background:#fff;border:1px solid #d4ccb8;border-radius:10px;padding:1.5rem;overflow-y:auto;max-height:calc(100vh - 120px);position:sticky;top:58px;align-self:start;}
.passage-box h3{font-size:.8rem;text-transform:uppercase;letter-spacing:.08em;color:#1a2744;border-bottom:2px solid #c9973a;padding-bottom:.5rem;margin-bottom:.3rem;}
.passage-box .psrc{font-size:.7rem;color:#888;font-style:italic;margin-bottom:1rem;}
.passage-box .ptxt{font-size:.87rem;line-height:1.9;}
.passage-box .ptxt p{margin-bottom:.8rem;}

.q-list{display:flex;flex-direction:column;gap:1.1rem;}

/* QUESTION CARD STATES */
.qcard{background:#fff;border:1px solid #d4ccb8;border-radius:10px;padding:1.25rem;transition:all .25s;}
.qcard.state-unanswered{}
.qcard.state-correct{border-left:4px solid #1a6b3c;background:#f0fbf4;}
.qcard.state-wrong{border-left:4px solid #c0392b;background:#fdf3f2;}

.qnum{font-size:.66rem;font-weight:bold;text-transform:uppercase;letter-spacing:.1em;color:#888;margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem;}
.qnum .badge-correct{background:#1a6b3c;color:#fff;font-size:.65rem;padding:.15rem .5rem;border-radius:3px;}
.qnum .badge-wrong{background:#c0392b;color:#fff;font-size:.65rem;padding:.15rem .5rem;border-radius:3px;}
.qtext{font-size:.9rem;line-height:1.62;margin-bottom:1rem;}

.opt-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:.4rem;}
.opt{display:flex;align-items:flex-start;gap:.6rem;padding:.62rem .9rem;border:1px solid #d4ccb8;border-radius:7px;background:#faf8f3;text-align:left;font-size:.86rem;width:100%;transition:all .18s;position:relative;}

/* Hoverable only when unanswered */
.opt.hoverable:hover{border-color:#1a2744;background:#f0ece0;transform:translateX(2px);}

/* Correct answer - always shown green after answering */
.opt.show-correct{border-color:#1a6b3c!important;background:#eaf7ee!important;color:#1a6b3c!important;font-weight:600;}
.opt.show-correct .opt-letter{color:#1a6b3c!important;}

/* Wrong selection */
.opt.show-wrong{border-color:#c0392b!important;background:#fdf3f2!important;color:#c0392b!important;}
.opt.show-wrong .opt-letter{color:#c0392b!important;}

/* Neutral locked (other options when answered) */
.opt.locked{opacity:.55;}
.opt.locked:hover{transform:none;}

.opt-letter{font-weight:bold;font-size:.78rem;color:#888;min-width:1rem;flex-shrink:0;padding-top:.05rem;}
.opt-icon{margin-left:auto;font-size:1rem;flex-shrink:0;}

/* Explanation */
.expl{margin-top:.9rem;padding:.8rem 1rem;background:#f0f4ff;border-left:3px solid #1a2744;border-radius:6px;font-size:.82rem;line-height:1.58;color:#333;}
.expl b{color:#1a2744;}
.expl .expl-hdr{font-size:.7rem;font-weight:bold;text-transform:uppercase;letter-spacing:.08em;color:#1a2744;margin-bottom:.35rem;}

/* BOTTOM BAR */
.bottombar{position:sticky;bottom:0;background:#fff;border-top:1px solid #d4ccb8;padding:.8rem 1.5rem;display:flex;align-items:center;justify-content:space-between;z-index:50;}
.qcount{font-size:.82rem;color:#888;}
.qcount b{color:#1a1a1a;}
.nav-btns{display:flex;gap:.6rem;}
.nbtn{padding:.5rem 1.2rem;border-radius:6px;font-size:.87rem;font-weight:600;border:1px solid #d4ccb8;background:#fff;color:#1a1a1a;transition:all .15s;}
.nbtn:hover{background:#f0ece0;}
.nbtn:disabled{opacity:.4;cursor:not-allowed;}
.nbtn.pri{background:#1a2744;color:#fff;border-color:#1a2744;}
.nbtn.pri:hover{background:#243358;}
.nbtn.gold{background:#c9973a;color:#1a2744;border-color:#c9973a;}
.nbtn.gold:hover{background:#e8b85a;}

/* RESULTS */
#results{padding:3rem 2rem;max-width:820px;margin:0 auto;}
.res-badge{font-size:.72rem;font-weight:bold;letter-spacing:.14em;text-transform:uppercase;color:#c9973a;background:rgba(201,151,58,.12);border:1px solid rgba(201,151,58,.3);display:inline-block;padding:.35rem 1.1rem;border-radius:2rem;margin-bottom:.8rem;}
#results h2{font-size:2rem;color:#1a2744;margin-bottom:.3rem;}
.score-wrap{text-align:center;margin:1.5rem 0;}
.score-big{font-size:5rem;font-weight:bold;color:#1a2744;line-height:1;}
.score-of{font-size:1.4rem;color:#888;}
.score-pct{font-size:1.1rem;color:#888;margin-top:.3rem;}
.score-grade{display:inline-block;padding:.3rem 1.2rem;border-radius:20px;font-weight:bold;font-size:.9rem;margin-top:.5rem;}
.grade-a{background:#eaf7ee;color:#1a6b3c;}
.grade-b{background:#e8f4fd;color:#1a5276;}
.grade-c{background:#fef9e7;color:#7d6608;}
.grade-d{background:#fdf3f2;color:#c0392b;}

.bk-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:1rem;margin:2rem 0;}
.bk-card{background:#fff;border:1px solid #d4ccb8;border-radius:10px;padding:1.1rem;text-align:center;}
.bk-sec{font-size:.66rem;font-weight:bold;text-transform:uppercase;letter-spacing:.1em;color:#c9973a;margin-bottom:.3rem;}
.bk-score{font-size:1.9rem;font-weight:bold;color:#1a2744;}
.bk-pct{font-size:.8rem;color:#888;}

.missed-hdr{font-size:1.1rem;color:#1a2744;border-bottom:2px solid #c9973a;padding-bottom:.4rem;margin:2rem 0 1rem;}
.mcard{background:#fff;border:1px solid #d4ccb8;border-left:3px solid #c0392b;border-radius:8px;padding:.9rem 1.1rem;margin-bottom:.6rem;}
.mq{font-size:.87rem;margin-bottom:.35rem;}
.mans{font-size:.78rem;color:#888;margin-bottom:.35rem;}
.mans b{font-weight:600;}
.mc{color:#1a6b3c!important;}
.mw{color:#c0392b!important;}
.mexpl{font-size:.8rem;color:#555;padding:.6rem .8rem;background:#f0f4ff;border-left:3px solid #1a2744;border-radius:5px;line-height:1.55;}
.mexpl b{color:#1a2744;}
.res-btns{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;margin-top:2rem;}
</style>
</head>
<body>

<!-- WELCOME -->
<div id="welcome">
  <h1>CLT Full Practice Test</h1>
  <p class="sub">119 questions &bull; 3 sections &bull; Instant feedback on every answer &bull; Timed</p>
  <div class="sec-grid">
    <button class="sec-btn" onclick="startSec(0)">
      <div class="snum">Section 1</div>
      <div class="stitle">Verbal Reasoning</div>
      <div class="smeta">40 questions &bull; 40 min</div>
    </button>
    <button class="sec-btn" onclick="startSec(1)">
      <div class="snum">Section 2</div>
      <div class="stitle">Grammar &amp; Writing</div>
      <div class="smeta">30 questions &bull; 35 min</div>
    </button>
    <button class="sec-btn" onclick="startSec(2)">
      <div class="snum">Section 3</div>
      <div class="stitle">Quantitative Reasoning</div>
      <div class="smeta">49 questions &bull; 45 min</div>
    </button>
  </div>
  <button class="big-btn" onclick="startSec(0)">&#9654; Begin Full Test (Start with Section 1)</button>
  <p style="color:rgba(255,255,255,.38);font-size:.78rem;margin-top:.8rem;">Or click a section card above to practice individually</p>
</div>

<!-- TEST -->
<div id="testscreen" class="hidden">
  <div class="topbar">
    <div style="display:flex;align-items:center;">
      <span class="secname" id="hdr-sec">Verbal Reasoning</span>
      <span class="passname" id="hdr-pass">Passage 1</span>
    </div>
    <div class="topright">
      <div class="live-score">Score: <span class="ls-num" id="live-c">0</span> / <span id="live-t">0</span></div>
      <span class="timer" id="timer">40:00</span>
      <button class="nbtn" onclick="goHome()" style="padding:.3rem .7rem;font-size:.76rem;">Exit</button>
    </div>
  </div>
  <div class="pbar-outer"><div class="pbar-inner" id="pbar" style="width:0%"></div></div>
  <div class="main-grid">
    <div class="passage-box" id="passage-box"></div>
    <div class="q-list" id="q-list"></div>
  </div>
  <div class="bottombar">
    <div class="qcount">Passage <b id="p-cur">1</b> of <b id="p-tot">4</b> &nbsp;&middot;&nbsp; <span id="q-ans">0</span> of <span id="q-tot">40</span> answered</div>
    <div class="nav-btns">
      <button class="nbtn" id="btn-prev" onclick="prevPass()">&#8592; Back</button>
      <button class="nbtn pri" id="btn-next" onclick="nextPass()">Next &#8594;</button>
      <button class="nbtn gold hidden" id="btn-sub" onclick="doSubmit()">Finish &amp; See Results</button>
    </div>
  </div>
</div>

<!-- RESULTS -->
<div id="results" class="hidden">
  <div style="text-align:center;margin-bottom:1.5rem;">
    <div class="res-badge">Section Complete</div>
    <h2 id="res-title">Results</h2>
  </div>
  <div class="score-wrap">
    <div class="score-big" id="res-score">0</div>
    <div class="score-of" id="res-of">/ 40</div>
    <div class="score-pct" id="res-pct"></div>
    <div id="res-grade"></div>
  </div>
  <div class="bk-grid" id="bk-grid"></div>
  <div class="missed-hdr">Questions You Missed</div>
  <div id="missed-list"></div>
  <div class="res-btns">
    <button class="big-btn" onclick="goHome()" style="background:#1a2744;color:#fff;">&#8592; Back to Menu</button>
    <button class="big-btn" onclick="retrySec()">&#8635; Retry This Section</button>
  </div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────
var SECS = [
{
  name: "Verbal Reasoning",
  mins: 40,
  passes: [
    {
      title: "Literature — Polly's New World",
      src: "Adapted from An Old-Fashioned Girl by Louisa May Alcott, 1870",
      txt: "<p><b>[1]</b> Polly once thought she was in a new world, a world where the manners and customs were so different from the things she was used to at home that she felt like a stranger in a strange land, and often wished that she had not come. Even the food she liked was not here, and she was afraid to let it be known, because the family seemed perfectly content — and a healthy person would surely sicken who was among them, living on confectionery.</p><p><b>[2]</b> But Polly had and often felt as if she were a prisoner, though an elegantly kept one. She used to wonder sometimes which of the two lives was the better, but now she no longer wondered — she felt it. She supposed it was merely another of her old-fashioned ways that made her long for the plain, hearty life she had known at home. She often felt like a little wood-bird shut up in a gilded cage.</p><p><b>[3]</b> Fanny's friends seemed so much older and cleverer than she; they talked about things of which she knew nothing. Polly felt that she was too odd to suit them. Outside of the parties, receptions, and promenades, the fashionable young ladies did nothing but ape the fashionable follies of their elders.</p><p><b>[4]</b> Tom, in his opinion, girls did not know anything worth knowing. He occasionally refreshed himself by teasing Polly, to see how she'd stand it, and caused her much anguish of spirit, because she never could tell when he was in earnest and when not.</p><p><b>[5]</b> As for Fanny, she was a sort of queen among her set, and Polly could only wonder at the skill with which she managed her little kingdom, while Polly herself was hustled out of the way whenever Fanny's grand friends came to call.</p>",
      qs: [
        {n:1, t:"From the passage, it can be inferred that Tom:", opts:["A) Admires Polly and wants her to become more worldly","B) Is frustrated with Polly for refusing luxuries","C) Treats Polly kindly because he feels responsible for her","D) Teases Polly in order to test her"], ans:"D", expl:"Paragraph 4 explicitly states he 'occasionally refreshed himself by teasing her, to see how she'd stand it.' The phrase 'to see how she'd stand it' shows deliberate testing of her character.", hint:"Find it in Paragraph 4: 'He occasionally refreshed himself by teasing Polly, to see how she'd stand it'"},
        {n:2, t:"Which lines best support the answer to the previous question?", opts:["A) Paragraph 1, Sentence 1","B) Paragraph 4, Sentence 2 — He occasionally … not","C) Paragraph 3, Sentence 1","D) Paragraph 5, Sentence 1"], ans:"B", expl:"Paragraph 4, Sentence 2 is the only line that directly states his motivation: 'to see how she'd stand it.' This is textual evidence — it tells us exactly why Tom teases Polly.", hint:"Go back to Paragraph 4 and find the sentence that begins 'He occasionally refreshed himself...' — that sentence is your evidence."},
        {n:3, t:"According to the passage, Polly views the Shaws with:", opts:["A) Aggression and contempt","B) Curiosity and delight","C) Annoyance and sympathy","D) Interest and admiration"], ans:"C", expl:"She is sick of their superficial lifestyle (annoyance) but also pities Fanny and Tom for being pushed aside (sympathy). Both emotions coexist.", hint:"Paragraph 1 shows annoyance ('sick...living on confectionery'). Paragraph 5 shows sympathy (Polly watches Fanny with wonder, Tom is 'hustled out of the way')."},
        {n:4, t:"Which activity is NOT mentioned as available to Polly at the Shaw residence?", opts:["A) Attending receptions and promenades","B) Keeping fashionable company with Fanny's friends","C) Conversing intelligently with like-minded individuals","D) Watching Fanny manage her social circle"], ans:"C", expl:"Polly felt like a stranger in a strange land and found Fanny's friends unrelatable. There is no mention anywhere of intelligent, like-minded conversation.", hint:"Scan each paragraph for what IS mentioned. Paragraph 3 mentions parties/receptions/promenades. Paragraph 5 mentions Fanny's circle. Option C simply never appears anywhere in the passage."},
        {n:5, t:"In Paragraph 2, the author uses which literary device to describe Polly's feelings?", opts:["A) Irony","B) Simile","C) Personification","D) Hyperbole"], ans:"B", expl:"'Like a little wood-bird shut up in a gilded cage' uses the word LIKE to compare Polly to a bird — the defining feature of a simile. If it said 'she WAS a wood-bird,' that would be a metaphor.", hint:"Find it in Paragraph 2: 'She often felt LIKE a little wood-bird shut up in a gilded cage.' The word LIKE is the key — it signals a simile."},
        {n:6, t:"According to the passage, Polly attributes her preference for a simpler lifestyle to:", opts:["A) Her old-fashioned ways","B) Her belief that simple life is morally superior","C) Her dislike of luxurious furnishings","D) Her discomfort with social interactions"], ans:"A", expl:"The text states she 'supposed it was merely another of her old-fashioned ways.' She attributes the preference to her upbringing, not to moral conviction.", hint:"Find it in Paragraph 2: 'She supposed it was merely another of her old-fashioned ways that made her long for the plain, hearty life.'"},
        {n:7, t:"In Paragraph 3, the phrase 'ape the fashionable follies' most closely means:", opts:["A) Imitate the genteel recklessness","B) Mock the contemporary indiscretions","C) Mimic the popular foolishness","D) Parody the chic silliness"], ans:"C", expl:"'Ape' means to imitate or copy. 'Follies' means foolish behaviors. So 'ape the fashionable follies' = mimic the popular foolishness. The girls are COPYING their elders' silly trends, not mocking them.", hint:"Find it at the end of Paragraph 3: '...did nothing but ape the fashionable follies of their elders.' Ask yourself: are the girls mocking their elders or copying them?"},
        {n:8, t:"The passage primarily focuses on:", opts:["A) A rift between two sisters over new friends","B) Two friends facing a shared dilemma","C) A family climbing the social ladder","D) A young girl in a new place where she feels uncomfortable"], ans:"D", expl:"Every paragraph returns to Polly's discomfort — stranger in a strange land, wood-bird in a cage, hustled out of the way. All other characters exist only to illustrate her central experience.", hint:"Notice the first word of Paragraph 1 is 'Polly' and she is the subject of every paragraph. The passage is always about how SHE feels in this new environment."},
        {n:9, t:"Tom : teasing Polly :: ", opts:["A) Mr. Shaw : ordering Tom","B) Polly : loving Maud's friends","C) Grandma : ignoring Tom","D) Polly : engaging Fanny's friends"], ans:"A", expl:"Tom's defining action toward Polly is teasing. Mr. Shaw's defining action toward Tom is ordering him about. Both are habitual patterns of one person's behavior toward another.", hint:"Paragraph 4 establishes Tom teasing Polly. Paragraph 5 mentions Tom being 'hustled out of the way' — implying his father orders him about. Look for the same relationship pattern."},
        {n:10, t:"healthy person : living on confectionery :: ", opts:["A) Set of girls : aping fashionable follies","B) Wood-bird : shut in a gilded cage","C) Born rebel : neglected and hustled away","D) Cat and dog : belonging to a happy family"], ans:"B", expl:"Both are analogies of natural misplacement. A healthy person cannot thrive on candy. A free wood-bird cannot thrive in a cage. Polly IS that wood-bird.", hint:"Paragraph 1 has the 'healthy person / confectionery' image. Paragraph 2 has the 'wood-bird / gilded cage' image. Both describe the same feeling — something natural trapped in the wrong environment."}
      ]
    },
    {
      title: "Science / Philosophy — Freud on Psychoanalysis",
      src: "Adapted from Introductory Lectures on Psycho-Analysis by Sigmund Freud",
      txt: "<p><b>[1]</b> It has always seemed to me to be a measure of great hardihood to take up the study of a difficult and unusual subject, like the psychology of the unconscious, without being prepared for its many challenges. We explain to the patient at the outset that we make no definite promises. Success depends upon his own efforts, good faith, and perseverance.</p><p><b>[2]</b> In your medical studies most of you have been accustomed to visual demonstrations: clinical pictures, anatomical specimens, reagents in chemical reactions, the stimulation of muscles by nerves. This is valuable, certainly. But with these methods it is impossible to demonstrate the invisible phenomena of the mind.</p><p><b>[3]</b> In psychoanalytic treatment, nothing happens but an exchange of words between the patient and the physician. The patient talks of his past experiences and present emotions. The physician listens, attempts to direct the patient's thoughts, and explains the mental processes at work. By words alone, one person can give to another the greatest happiness or bring about utter despair.</p><p><b>[4]</b> You may perhaps be set against this and say: But mere words cannot do much. The unenlightened relatives who doubt the approach mock psychoanalysis for relying on what they call mere talk. They demand to see results they can point to — like an action in a cinema.</p><p><b>[5]</b> Words and magic were, in the beginning, one and the same thing. Even today words retain much of their magical power. By words the teacher imparts knowledge; by words the orator sweeps his audience. Words call forth emotions and are universally the means by which we influence our fellow-creatures. Therefore let us not despise the use of words in psychotherapy.</p>",
      qs: [
        {n:11, t:"The structure of this passage can best be described as:", opts:["A) Freud contrasts visual medicine with verbal psychotherapy, then defends the power of words","B) Freud begins with personal anecdote, then pivots to the history of psychoanalysis","C) Freud presents criticisms of modern medicine and argues older traditions are superior","D) Freud defines key terms and lists factors of medicine that matter most"], ans:"A", expl:"The first half details how traditional medicine is visual while psychoanalysis is verbal. The second half defends verbal treatment by arguing words have retained their ancient magical power.", hint:"Paragraph 2 = visual medicine. Paragraph 3 = verbal treatment. Paragraph 5 = defense of words. That two-part move (contrast, then defense) IS the structure of the whole passage."},
        {n:12, t:"The passage is primarily concerned with:", opts:["A) The value of visual demonstrations in medical education","B) The superior results from longer patient interactions","C) The power of language to influence mental and physical health","D) The ethical questions confronting psychotherapists"], ans:"C", expl:"Paragraph 5 is the climax: 'Words call forth emotions and are universally the means by which we influence our fellow-creatures.' The entire passage builds toward this claim.", hint:"Read the LAST paragraph — it is always the conclusion. Paragraph 5 ends: 'Words call forth emotions and are universally the means by which we influence our fellow-creatures.' That is the main idea."},
        {n:13, t:"The author believes that:", opts:["A) The scientific method should be abandoned for emotional techniques","B) Psychoanalysis is superior in every way to traditional medicine","C) Psychoanalysis is often opposed by traditional medical practitioners","D) Traditional medicine always produces better results than psychoanalysis"], ans:"C", expl:"Paragraph 4 directly presents this opposition: critics mock psychoanalysis for relying on mere talk and demand visible, tangible proof.", hint:"Find it in Paragraph 4: 'The unenlightened relatives...mock psychoanalysis for relying on what they call mere talk.' That sentence describes opposition to Freud's method."},
        {n:14, t:"Which lines provide the best evidence for the answer to Question 13?", opts:["A) Paragraph 1, Sentence 1","B) Paragraph 2, Sentence 2","C) Paragraph 3, Sentence 1","D) Paragraph 4, Sentences 2-3 — The unenlightened relatives…"], ans:"D", expl:"Paragraph 4 directly describes the critics: they mock psychoanalysis as mere talk and demand visible proof. This is the clearest textual evidence of the opposition Freud faces.", hint:"Your job: find the sentence that explicitly names people who OPPOSE psychoanalysis. Go to Paragraph 4 and look for 'unenlightened relatives' — that's your evidence sentence."},
        {n:15, t:"According to Freud, neurotic patients are best described as:", opts:["A) Wholly responsible for their own recovery","B) Incapable of understanding their own condition","C) Unable to respond to any traditional medical treatment","D) Dependent on the psychoanalyst's skill in directing the exchange of words"], ans:"D", expl:"Since 'nothing happens but an exchange of words' and the physician must 'direct the patient's thoughts,' the patient's recovery depends entirely on the analyst's skill.", hint:"Find it in Paragraph 3: 'The physician listens, attempts to DIRECT the patient's thoughts.' If the physician must direct, the patient depends on that direction."},
        {n:16, t:"In Paragraph 3, the word 'yields' most closely means:", opts:["A) Surrenders","B) Gives way under pressure","C) Produces","D) Earns"], ans:"C", expl:"'Yields a series of observations' means the process results in or generates observations. This is the agricultural sense of yield — a crop yields a harvest, meaning it produces one.", hint:"Try substituting each answer choice into the sentence. 'The study surrenders a series of observations'? No. 'The study PRODUCES a series of observations'? Yes — that fits perfectly."},
        {n:17, t:"According to the passage, psychoanalytic methods:", opts:["A) Require physical examinations alongside verbal communication","B) Primarily involve a conversation between patient and physician","C) Are identical to traditional medical practices","D) Rely on anatomical demonstrations to help the patient understand"], ans:"B", expl:"Paragraph 3, Sentence 1 states it directly: 'In psychoanalytic treatment, nothing happens but an exchange of words between the patient and the physician.'", hint:"Find it at the very start of Paragraph 3: 'In psychoanalytic treatment, NOTHING HAPPENS BUT an exchange of words...' That phrase is as direct as it gets."},
        {n:18, t:"Based on the passage's logic, which conclusion about verbal vs. traditional treatment is best supported?", opts:["A) Verbal treatment is always significantly more expensive","B) There is no significant difference in long-term legitimacy between the two methods","C) Traditional treatment is always more cost-effective","D) Words are less reliable than physical interventions"], ans:"B", expl:"Freud argues verbal treatment is VALID and effective — not that it always outperforms physical medicine. He seeks to establish parity of legitimacy, not claim superiority.", hint:"Freud never says one method costs more or is always better. He says verbal treatment is EQUALLY valid. Look at Paragraph 5 — he defends words as powerful, not superior to all other methods."},
        {n:19, t:"The relationship of 'relatives : cinema' in Paragraph 4 is best compared to:", opts:["A) Science : empirical data","B) Logic : objective proof","C) Patient : delusion","D) Analyst : verbal therapy"], ans:"C", expl:"Relatives can only be impressed by visible things (like a cinema screen) and are blind to internal mental reality. Similarly, a patient is subject to their delusion — both are trapped by a false understanding of reality.", hint:"Find it in Paragraph 4: relatives only believe what they can see, like 'an action in a cinema.' They can't see internal mental states. A patient trapped in a delusion also can't see objective reality. Same blindness, different form."},
        {n:20, t:"Freud's argument can be best summarized as:", opts:["A) Psychotherapy is the only truly scientific approach to healing","B) Words are only useful when combined with visible demonstrations","C) Words are the primary and powerful means of influence in psychotherapy","D) The exchange of words between patient and physician is a modern invention"], ans:"C", expl:"The climax in Paragraph 5: words are 'universally the means by which we influence our fellow-creatures.' The whole passage argues that psychotherapy should embrace this ancient power of language.", hint:"The summary of any passage is almost always in the FINAL paragraph. Read Paragraph 5's last sentence: 'Words call forth emotions and are universally the means by which we influence our fellow-creatures.' That IS the summary."}
      ]
    },
    {
      title: "History — Frederick Douglass on Reconstruction",
      src: "Adapted from a speech by Frederick Douglass, 1866",
      txt: "<p><b>[1]</b> Slavery, like all other great systems of wrong, founded in the depths of human selfishness, and existing for ages, has not neglected its own conservation. It has steadily exerted an influence upon all around it favorable to its own continuance. It has obtained the services of able and skillful men to defend it.</p><p><b>[2]</b> Custom, tradition, morality, religion — all are on the side of the institution. What is now needed is to make the Federal government reach out its powerful arm to destroy it. It is impossible to expect the government to do this without active, intentional Reconstruction that replaces the old system with one based on justice and law.</p><p><b>[3]</b> The people demand such a Reconstruction as shall put an end to the present anarchical state of things in the late Rebellious States. This requires Northern capital, Northern culture, and Northern civilization to flow into the South, making a man from New England as much at home in Carolina as elsewhere in the Republic. The South must be restored to the right of law and order, and Congress must complete this important work.</p><p><b>[4]</b> The unfortunate mistake of the last session was attempting to secure political rights for citizens while permitting the rebellious States to disenfranchise them. The negro has been supplanted and emasculated of the citizenship rights guaranteed by the Constitution, which knows no distinction between citizens on account of color.</p><p><b>[5]</b> The Constitution of the United States knows no distinction between citizens on account of color. It is a legal obligation of the government toward all its citizens. The amendments to the Constitution will do this work, if only Congress will enforce them fully and without compromise.</p>",
      qs: [
        {n:21, t:"The main argument of the passage can best be described as:", opts:["A) A personal history of the author's experience with slavery","B) A warning to Northerners not to abandon economic progress in the South","C) A rhetorical and political demand for the full realization of equality","D) A description of the historical causes of the Civil War"], ans:"C", expl:"Douglass is not narrating history — he is demanding action. He calls for Reconstruction, equal citizenship, and Congressional enforcement of Constitutional rights for all citizens.", hint:"Look at the verbs Douglass uses throughout: 'demand,' 'must,' 'needed,' 'will.' These are command words, not description words. The entire passage is a demand for action — that is Option C."},
        {n:22, t:"Douglass's stance on Federal authority is that:", opts:["A) The Federal government has no authority to interfere with state customs","B) Since the Federal government has the power to destroy slavery, it has the obligation to do so","C) Both Federal and state governments have equal roles in civil rights","D) The Federal government should allow states to resolve their own conflicts"], ans:"B", expl:"Paragraph 2 says the Federal government must 'reach out its powerful arm to destroy' slavery. Power and obligation are directly linked.", hint:"Find it in Paragraph 2: 'What is now needed is to make the Federal government REACH OUT ITS POWERFUL ARM to destroy it.' That phrase connects power to obligation."},
        {n:23, t:"According to Douglass, economic and social integration between North and South would:", opts:["A) Increase division between the regions","B) Be less effective than military enforcement","C) Make Americans feel equally at home in any part of the country","D) Need to be severed until peace is established"], ans:"C", expl:"Paragraph 3 states that Northern capital and civilization flowing into the South would make 'a man from New England as much at home in Carolina as elsewhere in the Republic.'", hint:"Find the exact quote in Paragraph 3: '...making a man from New England AS MUCH AT HOME in Carolina as elsewhere in the Republic.' That phrase is the answer to this question word-for-word."},
        {n:24, t:"The primary obstacle to Reconstruction that Douglass identifies is:", opts:["A) Physical destruction from the war","B) Political discrimination against Black citizens","C) Lack of Northern investment in the South","D) The complexity and size of the task"], ans:"B", expl:"Paragraph 4 focuses on the 'mistake' of allowing rebellious states to 'disenfranchise' citizens even while trying to secure their political rights.", hint:"Find it in Paragraph 4: 'The unfortunate mistake...was attempting to secure political rights...while permitting the rebellious States to DISENFRANCHISE them.' Disenfranchise = deny the right to vote = political discrimination."},
        {n:25, t:"In Paragraph 4, the word 'recognition' most closely means:", opts:["A) Acknowledgment","B) Prominence","C) Awareness","D) Foresight"], ans:"A", expl:"In legal and political contexts, recognition of rights means the formal, official acknowledgment of those rights by the government.", hint:"Try the substitution test. Replace 'recognition' with each option in context: 'formal ACKNOWLEDGMENT of rights' makes perfect sense in a legal speech. 'Formal AWARENESS' and 'formal PROMINENCE' do not fit."},
        {n:26, t:"According to Douglass, the legal status of Black Americans is that:", opts:["A) They are not yet legally citizens under any interpretation","B) They are fully protected by both state and Federal law","C) They are only partially recognized as citizens of their home state","D) They are legally citizens but are being denied the rights of citizenship"], ans:"D", expl:"Douglass says the Constitution 'knows no distinction between citizens on account of color,' yet Black Americans have been 'supplanted' of these rights by rebellious states.", hint:"Read Paragraph 4 and Paragraph 5 together. P5 says the Constitution guarantees equal citizenship. P4 says those rights have been 'supplanted.' Law says one thing; reality delivers another — that is Option D."},
        {n:27, t:"Which lines provide the best evidence for the answer to Question 26?", opts:["A) Paragraph 1, Sentence 1","B) Paragraph 2, Sentence 1","C) Paragraph 3, Sentence 2","D) Paragraph 4, Sentence 2 — The negro has been supplanted…"], ans:"D", expl:"Paragraph 4, Sentence 2 explicitly states the negro 'has been supplanted and emasculated of the citizenship rights guaranteed by the Constitution' — directly showing the gap between legal entitlement and reality.", hint:"You need the sentence that shows BOTH the legal guarantee AND the practical denial. Find it in Paragraph 4: 'The negro has been supplanted and emasculated of the citizenship rights GUARANTEED by the Constitution.' Both ideas are in one sentence."},
        {n:28, t:"Douglass characterizes slavery as:", opts:["A) A temporary arrangement that will naturally fade","B) A legally ambiguous system requiring court interpretation","C) A persistent force that influences all aspects of life","D) Primarily an economic system with few social implications"], ans:"C", expl:"Paragraph 1 says slavery 'has steadily exerted an influence upon all around it.' It operates through custom, tradition, morality, and religion — all aspects of life.", hint:"Find it in Paragraph 1: 'It has STEADILY EXERTED AN INFLUENCE upon all around it favorable to its own continuance.' Then Paragraph 2 lists: 'Custom, tradition, morality, religion — all are on the side of the institution.' Every area of life is touched."},
        {n:29, t:"Reconstruction : South :: ", opts:["A) Medicine : disease","B) Shadow : substance","C) Law : custom","D) North : South"], ans:"A", expl:"The South is in an anarchical state — like a disease. Reconstruction is the prescribed intervention to restore order and health — just as medicine treats disease.", hint:"Find it in Paragraph 3: Douglass describes the South as being in an 'anarchical state of things' — that is the disease. Reconstruction is what he prescribes to fix it — that is the medicine. Remedy : the problem it addresses."},
        {n:30, t:"custom and manners : law :: ", opts:["A) Loyalty : obligation","B) Shadow : substance","C) Tradition : amendment","D) State : nation"], ans:"B", expl:"Douglass argues customs and manners are the shadow of the old system. The law (the Constitution) is the real, solid substance of what the nation is.", hint:"Paragraph 2 lists customs, tradition, morality, religion as the things that support slavery. Then Paragraph 5 says the Constitution (the LAW) is the true foundation. Customs = the shadow. Law = the real substance."}
      ]
    },
    {
      title: "Science — Lyell on Geological Time",
      src: "Adapted from Principles of Geology by Charles Lyell, published 1830",
      txt: "<p><b>[1]</b> In the infancy of science, observers were naturally led to conclude that the changes taking place in the world were the effects of sudden and violent catastrophes, rather than of slow and gradual causes. They tried to fit all geological history into a span of a few thousand years — the brief period of recorded human memory.</p><p><b>[2]</b> The first observers were naturally led to limit the period of the past duration of the earth. They saw rivers which rose and fell, earthquakes, volcanoes — all visible, dramatic, and brief. It was natural that they supposed the Earth's features were formed by equally dramatic events, rather than by the imperceptibly slow operations we now understand to dominate geological change.</p><p><b>[3]</b> We must, therefore, be careful not to measure the duration of past events by the brief standard of our own existence. Consider the historian who studies Egypt using only records of a few dynasties. He might assume the series of events was continuous when it was actually defective — missing vast gulfs of time between known periods. So too, the geologist who reads only the strata before him may miss the vast gaps in time that separate one layer from another.</p><p><b>[4]</b> The succession of phenomena in the natural world, when examined over the true scale of geological time, reveals slow, patient processes at work — rivers grinding down mountains grain by grain, coastlines advancing and retreating over millennia. This is the ordinary course of nature. It requires of us a great readjustment of our temporal imagination.</p>",
      qs: [
        {n:31, t:"The primary purpose of this passage is to:", opts:["A) Describe a specific volcanic eruption in detail","B) Argue that human civilization is older than previously thought","C) Explain why early geologists made errors about the Earth's history","D) Provide a historical overview of the development of geology as a field"], ans:"D", expl:"The passage tracks the evolution of geological thinking — from catastrophism to uniformitarianism. This is a historical overview of how scientific understanding developed.", hint:"Notice the structure: P1-P2 describe EARLY (wrong) thinking. P3-P4 describe the CORRECT modern understanding. The passage traces the DEVELOPMENT of the field from old to new — that is a historical overview."},
        {n:32, t:"According to the passage, early geological observers erred because:", opts:["A) They had no access to rocks or physical specimens","B) They assumed the Earth's history was much shorter than it actually is","C) They were pressured to confirm religious texts","D) They trusted dramatic events over rock layers"], ans:"B", expl:"Paragraph 1 says they 'tried to fit all geological history into a span of a few thousand years.' The core error is compressing vast geological time into the brief span of human memory.", hint:"Find it in Paragraph 1: 'They tried to fit all geological history into a span of a FEW THOUSAND YEARS — the brief period of recorded human memory.' That sentence is the direct answer."},
        {n:33, t:"The 'prejudices' of early observers that Lyell references were caused by:", opts:["A) Religious bias against scientific investigation","B) Overreliance on mathematical models","C) Human life being too short to observe major geological changes","D) A lack of fossil specimens to study"], ans:"C", expl:"A human life is so short that we never see mountains rise or coastlines shift significantly. This made early thinkers assume Earth's features were formed suddenly and recently.", hint:"Find it in Paragraph 3: 'We must...be careful not to measure the duration of past events by the BRIEF STANDARD OF OUR OWN EXISTENCE.' Our existence is too brief — that is the prejudice Lyell identifies."},
        {n:34, t:"In Paragraph 4, the word 'succession' most closely means:", opts:["A) Sequence","B) Inheritance","C) Replacement","D) Outcome"], ans:"A", expl:"'The succession of phenomena' refers to the chronological sequence in which geological events occur — one event following another over time.", hint:"Find it at the start of Paragraph 4: 'The SUCCESSION of phenomena in the natural world...' Read the whole sentence. It describes events occurring over geological time in order. 'Succession' here means the ordered sequence of events."},
        {n:35, t:"Lyell's comparison to an Egyptian historian serves to illustrate:", opts:["A) That ancient Egypt was geologically significant","B) That historians and geologists use identical methods","C) That ancient historical records are often incomplete and misleading","D) That the Mediterranean has the most complete geological record"], ans:"C", expl:"Lyell uses the historian as a parallel to the geologist. A historian using only a few dynastic records assumes they were continuous when vast gaps existed.", hint:"Find the analogy in Paragraph 3. The historian 'might assume the series of events was CONTINUOUS when it was actually DEFECTIVE — missing vast gulfs of time.' Defective means incomplete. Lyell's point: incomplete records lead to wrong conclusions."},
        {n:36, t:"In Paragraph 3, the Egyptian historian analogy primarily illustrates:", opts:["A) The value of primary sources in historical research","B) Why geology and history are the same discipline","C) The inaccuracy that results from not knowing what gaps exist in a record","D) The importance of studying multiple ancient civilizations"], ans:"C", expl:"The historian's record is 'defective' — missing vast gaps he doesn't know about, leading to false conclusions about continuity.", hint:"The key word is in Paragraph 3: 'actually DEFECTIVE — missing vast gulfs of time.' The historian doesn't know what he's missing. That unknown gap causes the inaccuracy. Focus on the word 'defective.'"},
        {n:37, t:"Which lines provide the best evidence for the answer to Question 36?", opts:["A) Paragraph 1, Sentence 1","B) Paragraph 2, Sentence 2","C) Paragraph 3, Sentence 2 — He might assume … defective","D) Paragraph 4, Sentence 1"], ans:"C", expl:"Paragraph 3, Sentence 2 states the historian's mistake: 'He might assume the series of events was continuous when it was actually defective — missing vast gulfs of time.'", hint:"You need the sentence that contains the word 'defective' — that is the word that proves the record has hidden gaps. Go to Paragraph 3 and find: 'He might assume the series...was continuous when it was actually DEFECTIVE.'"},
        {n:38, t:"According to the passage, early geologists made errors because they:", opts:["A) Refused to study rock layers systematically","B) Failed to account for the vast scale of geological time","C) Trusted dramatic visible events over subtle processes","D) Had no knowledge of chemistry or physics"], ans:"B", expl:"Paragraph 4 says we need 'a great readjustment of our temporal imagination.' The errors came from using human timescales to measure events that require millions of years.", hint:"Find it in Paragraph 4: 'It requires of us a great READJUSTMENT OF OUR TEMPORAL IMAGINATION.' Temporal = relating to time. Readjustment = we had it wrong. The error was about TIME — failing to account for how vast geological time really is."},
        {n:39, t:"human life : geological time :: ", opts:["A) Ocean : river","B) Year : century","C) A drop of water : the ocean","D) Mountain : valley"], ans:"C", expl:"Lyell's argument is that a human life is almost incomprehensibly small compared to geological time. A drop of water compared to the entire ocean captures that vast disproportion.", hint:"Paragraph 3 says we must not measure geological time by 'the BRIEF STANDARD of our own existence.' Paragraph 4 talks about coastlines changing 'over MILLENNIA.' A human life vs. millions of years = the tiniest fraction imaginable. Only 'drop of water : ocean' captures that scale."},
        {n:40, t:"fossil record : history of the earth :: ", opts:["A) Fragmented manuscript : story","B) Telescope : stars","C) Map : territory","D) Diary : biography"], ans:"A", expl:"Lyell views the earth's layers as a manuscript missing many pages — we can see parts of the story but it is fragmentary and incomplete, full of unknown gaps.", hint:"Paragraph 3 uses the historian analogy — a historian with only SOME records trying to understand the FULL story. A manuscript missing pages is the same idea: you have fragments, but not the whole. The fossil record is those fragments."}
      ]
    }
  ]

{
  name: "Grammar & Writing",
  mins: 35,
  passes: [
    {
      title: "The Pony Express",
      src: "Adapted passage about the Pony Express, mid-19th century American history",
      txt: "<p><b>[1]</b> The Pony Express was a mail service that operated in the American West from April 1860 to October 1861. [Q41] It played a vital role in connecting the eastern and western United States during a critical period in American history.</p><p><b>[2]</b> The service operated during the [Q42] mid-nineteenth century, when tensions between the North and South were escalating. These tensions only [Q43] exacerbated the existing divisions in American society.</p><p><b>[3]</b> The telegraph was faster at sending messages, [Q44] the Pony Express was still necessary for delivering physical mail across the vast frontier.</p><p><b>[4]</b> The safety of the [Q45] riders was paramount. Each rider would carry a mochila [Q46], which was a leather saddlebag that could be quickly transferred from horse to horse. Riders carried mail across terrain that tested their [Q47] weight speed and endurance.</p><p><b>[5]</b> The mochila [Q48], which was a specially designed leather pouch, could hold up to 20 pounds of mail. [Q49] the service managed to deliver mail from Missouri to California in just 10 days. The Pony Express and [Q50] their riders became American legends, symbols of speed and courage.</p>",
      qs: [
        {n:41, t:"Q41: How should the two sentences about the Pony Express be best combined?", opts:["A) NO CHANGE — keep as two sentences","B) …1861, and it played a vital role…","C) …1861; and it played a vital role…","D) …1861 — and it played a vital role…"], ans:"B", expl:"Joining two independent clauses requires a comma + coordinating conjunction (FANBOYS). '1861, and it played' is correct. Option C incorrectly uses a semicolon before 'and.'", hint:"Grammar rule: Two independent clauses joined by a FANBOYS word (for, and, nor, but, or, yet, so) need a COMMA before the conjunction. So: '...1861, AND it played...' The semicolon in Option C is wrong because you don't use ; AND together."},
        {n:42, t:"Q42: 'The service operated during the mid-nineteenth century, [back then / DELETE / at that point in time]…'", opts:["A) back then,","B) at that point in time,","C) in those bygone days,","D) DELETE the underlined portion"], ans:"D", expl:"'Mid-nineteenth century' already tells us when. Adding 'back then' is redundant — it repeats information already stated.", hint:"Grammar rule: Redundancy — saying the same thing twice. 'Mid-nineteenth century' already tells the reader WHEN. Adding 'back then' says WHEN again. On CLT grammar, DELETE is correct when the underlined portion repeats something already stated."},
        {n:43, t:"Q43: 'These tensions only ______ the existing divisions in American society.'", opts:["A) exacerbated","B) made worse","C) increased and deepened severely","D) worsened things more"], ans:"A", expl:"'Exacerbated' precisely and formally means made an already bad situation worse. Options B, C, and D are informal or redundant.", hint:"Grammar rule: Word precision. The CLT prefers the single most accurate formal word. 'Exacerbated' = made worse. Options C and D pile on multiple words to say the same thing — that is wordiness, which is always wrong on CLT. One precise word beats three vague ones."},
        {n:44, t:"Q44: 'The telegraph was faster at sending messages, ______ the Pony Express was still necessary.'", opts:["A) and","B) so","C) but","D) for"], ans:"C", expl:"The sentence presents a contrast: the telegraph was faster, yet the Pony Express was still needed. 'But' signals contrast.", hint:"Grammar rule: FANBOYS conjunctions. AND adds. SO shows result. FOR shows reason. BUT shows contrast. The telegraph being faster vs. the Pony Express still being needed = those two things are in CONTRAST. Contrast = BUT."},
        {n:45, t:"Q45: 'The safety of the ______ was paramount.' (referring to multiple riders)", opts:["A) rider's","B) riders'","C) riders","D) rider"], ans:"B", expl:"Multiple riders = plural. For a regular plural noun ending in 's', the apostrophe goes AFTER the 's': riders'.", hint:"Grammar rule: Plural possessives. One rider's safety = rider's (apostrophe before s). Multiple riders' safety = riders' (apostrophe AFTER the s, because the word already ends in s). The passage refers to multiple riders, so riders' is correct."},
        {n:46, t:"Q46: Tense check — the whole passage is past tense. 'The mochila ______ a leather saddlebag.'", opts:["A) is","B) was","C) will be","D) has been"], ans:"B", expl:"The passage describes historical events. Tense must be consistent: past tense throughout. 'Was' maintains that consistency.", hint:"Grammar rule: Tense consistency. Scan the passage — every verb is past tense (operated, played, were, escalating). The Pony Express no longer exists. Any verb in this passage must be past tense. 'Is' (present) breaks that consistency."},
        {n:47, t:"Q47: 'Riders carried mail across terrain that tested their ______ speed and endurance.'", opts:["A) weight speed and","B) weight, speed and","C) weight, speed, and","D) weight and speed and"], ans:"C", expl:"Three items in a list need commas between each item including before the final 'and' — the Oxford (serial) comma.", hint:"Grammar rule: Serial commas. Three items in a list = item1, item2, AND item3. The comma before 'and' (the Oxford comma) is REQUIRED on CLT. Option B missing that comma is wrong. Pattern: weight, speed, AND endurance."},
        {n:48, t:"Q48: 'The mochila, ______ a specially designed leather pouch, could hold up to 20 pounds.'", opts:["A) NO CHANGE — which was","B) being","C) it was","D) DELETE the underlined portion"], ans:"A", expl:"'Which was a specially designed leather pouch' is a non-restrictive relative clause that adds helpful information set off by commas.", hint:"Grammar rule: Relative clauses with 'which.' When you add extra information about a noun using a phrase set off by commas, use 'which was...' Test it: remove the phrase — 'The mochila...could hold up to 20 pounds.' Still makes sense? Yes. So the phrase is non-restrictive and 'which was' is correct."},
        {n:49, t:"Q49: '[______], the service managed to deliver mail from Missouri to California in just 10 days.'", opts:["A) However","B) Although","C) Therefore","D) Furthermore"], ans:"D", expl:"The previous sentence describes the mochila's impressive design. This sentence adds another impressive achievement. 'Furthermore' signals the addition of supporting information.", hint:"Grammar rule: Transition logic. HOWEVER = contrast. THEREFORE = result/conclusion. FURTHERMORE = adding another supporting point. The previous sentence praised the mochila's design. This sentence adds ANOTHER impressive fact (10-day delivery). Adding = FURTHERMORE."},
        {n:50, t:"Q50: 'The Pony Express and ______ riders became American legends.'", opts:["A) their","B) its","C) they're","D) it's"], ans:"B", expl:"'The Pony Express' is a single organization — singular. The correct singular possessive pronoun is 'its.'", hint:"Grammar rule: Singular vs. plural pronouns. 'The Pony Express' = one organization = singular. Singular possessive = ITS (like 'the company and its employees'). THEIR is plural (for groups of people). NEVER confuse ITS (possessive) with IT'S (= it is)."}
      ]
    },
    {
      title: "Booker T. Washington and the Path Forward",
      src: "Adapted passage on Booker T. Washington and educational policy",
      txt: "<p><b>[1]</b> Booker T. Washington was one of the most prominent African American leaders of the late 19th and early 20th centuries. [Q51] However his approach to racial progress was controversial and debated among his contemporaries.</p><p><b>[2]</b> The process of rebuilding after Reconstruction [Q52] remains a complex chapter in American history. Washington believed that industrial education and economic self-sufficiency were [Q53] the most important foundations for advancement.</p><p><b>[3]</b> Washington founded the Tuskegee Institute in 1881, [Q54] which served as a model for vocational training. The school provided practical skills training [Q55] while also emphasizing character development and civic responsibility.</p><p><b>[4]</b> [Q56] Recently historians have re-evaluated Washington's legacy in light of new evidence. Washington's philosophy [Q57] emphasizes the value of economic independence as a precursor to political equality.</p><p><b>[5]</b> Washington believed that earning economic respect [Q59] for Black Americans was the first step toward full citizenship. His legacy endures today [Q60] as a reminder that progress often requires patience, strategy, and an unwavering commitment to education.</p>",
      qs: [
        {n:51, t:"Q51: 'However his approach to racial progress was controversial.' How should 'however' be punctuated?", opts:["A) NO CHANGE — However his","B) However, his","C) However; his","D) However: his"], ans:"B", expl:"When 'however' is a conjunctive adverb introducing a contrasting thought at the start of a sentence, it must be followed by a comma.", hint:"Grammar rule: Introductory conjunctive adverbs (however, therefore, furthermore, etc.) ALWAYS need a comma after them when they open a sentence. 'However, his approach...' The comma tells the reader to pause. Without it, the sentence runs together incorrectly."},
        {n:52, t:"Q52: 'The process of rebuilding after Reconstruction ______ a complex chapter in American history.'", opts:["A) NO CHANGE — remains","B) remain","C) are remaining","D) have remained"], ans:"A", expl:"The subject is 'The process' — singular. Therefore the verb must be singular: 'remains.'", hint:"Grammar rule: Subject-verb agreement. Find the TRUE subject — it is 'The PROCESS' (singular), not 'Reconstruction.' 'After Reconstruction' is a prepositional phrase that hides the subject. Cross it out mentally: 'The process _____ a complex chapter.' Singular subject = singular verb = remains."},
        {n:53, t:"Q53: 'Washington believed that industrial education and self-sufficiency were ______ for advancement.'", opts:["A) the most key","B) the most meticulous","C) the most essential foundations","D) the most important foundations"], ans:"D", expl:"'The most important foundations' is precise and formal. 'The most key' is redundant. 'Meticulous' means extremely careful — it does not describe the foundations of a movement.", hint:"Grammar rule: Word choice precision. Eliminate wrong answers: 'most key' = redundant (key already means important). 'Meticulous' = careful/detailed — wrong meaning entirely. 'Most essential' vs 'most important' — both work, but 'important foundations' is the more natural, idiomatic phrase in formal writing."},
        {n:54, t:"Q54: 'Washington founded the Tuskegee Institute in 1881, ______ as a model for vocational training.'", opts:["A) NO CHANGE — which served","B) and it served","C) serving","D) DELETE the underlined portion"], ans:"A", expl:"'Which served as a model' is a relative clause that smoothly adds information about the Institute without redundancy.", hint:"Grammar rule: Relative clauses. 'Which served' adds non-essential information about the Institute set off by a comma. Test alternatives: 'and it served' creates two full sentences awkwardly joined. 'Serving' creates a dangling modifier. 'Which served' is the most concise and grammatically clean option."},
        {n:55, t:"Q55: 'The school provided practical skills training ______ also emphasizing character development.'", opts:["A) and","B) but","C) while","D) since"], ans:"C", expl:"'While' describes two things happening simultaneously or in parallel — practical training AND character development occurring together.", hint:"Grammar rule: Conjunctions showing time/simultaneity. WHILE = two things happening at the same time. The school was SIMULTANEOUSLY teaching skills AND emphasizing character. AND is less precise (just adds). BUT implies contrast. SINCE implies cause. WHILE captures the parallel, simultaneous nature perfectly."},
        {n:56, t:"Q56: '______ historians have re-evaluated Washington's legacy in light of new evidence.'", opts:["A) Recently,","B) With recency,","C) In recent time,","D) As of late,"], ans:"A", expl:"'Recently,' is the standard introductory adverb followed by a comma. The other options are not idiomatic English.", hint:"Grammar rule: Standard adverb form. 'Recently' is the clean, correct adverb. 'With recency' — no one says this. 'In recent time' — awkward and non-standard. 'As of late' — informal. On CLT, always pick the most standard, natural-sounding phrasing. 'Recently,' wins easily."},
        {n:57, t:"Q57: 'Washington's philosophy ______ the value of economic independence.'", opts:["A) NO CHANGE — emphasizes","B) emphasized","C) had emphasized","D) was emphasizing"], ans:"A", expl:"This is the literary present — when discussing a thinker's ideas that are still studied today, use simple present tense: 'emphasizes.'", hint:"Grammar rule: Literary present tense. When you discuss an author's or philosopher's ideas that still exist and are still studied, use PRESENT tense. Washington's philosophy still EXISTS today as a body of thought. So it 'emphasizes' (present), not 'emphasized' (past — would mean the philosophy no longer exists)."},
        {n:59, t:"Q59: 'Washington believed that earning economic respect ______ Black Americans was the first step toward full citizenship.'", opts:["A) of","B) for","C) by","D) with"], ans:"B", expl:"We earn something 'for' a person or group — meaning on their behalf, in their interest.", hint:"Grammar rule: Preposition choice. 'Respect FOR someone' = respect that benefits them, earned on their behalf. 'Respect OF someone' = respect that they already have/possess. 'Respect BY someone' = they are doing the earning. Washington wanted respect earned on BEHALF of Black Americans = FOR."},
        {n:60, t:"Q60: 'His legacy endures today ______ a reminder that progress often requires patience, strategy, and commitment.'", opts:["A) NO CHANGE — as","B) like","C) being","D) DELETE the underlined portion"], ans:"A", expl:"'As' introduces a role or function: 'endures as a reminder' = functions in the role of a reminder. 'Like' is used for comparisons between two separate, distinct things.", hint:"Grammar rule: AS vs. LIKE. AS introduces a role or capacity ('serves AS a reminder' = IS a reminder). LIKE introduces a comparison between two different things ('runs LIKE a cheetah' = similar to, but not the same as). His legacy literally IS a reminder — use AS, not LIKE."}
      ]
    },
    {
      title: "Sudan: The Last Northern White Rhino",
      src: "Adapted passage about Sudan, the last male northern white rhinoceros",
      txt: "<p><b>[1]</b> Sudan, the last male northern white rhino [Q61] lived at the Ol Pejeta Conservancy in Kenya until his death in March 2018. [Q62] However, his passing marked a devastating milestone for the species, which had once roamed the grasslands of central Africa in large numbers.</p><p><b>[2]</b> In his final years, Sudan [Q63] was considered an ambassador for his species, drawing international attention to the [Q64] precarious state of wildlife conservation worldwide.</p><p><b>[3]</b> The northern white rhino population declined primarily due to poaching and habitat destruction [Q65] extinction; however, scientists have not given up hope. Advances in reproductive technology offer a potential path forward.</p><p><b>[4]</b> The loss of [Q66] the species serves as a powerful reminder of the consequences of human activity. The future of [Q67] the planet's biodiversity depends on the choices made today by conservationists working to preserve [Q68] the genetic material of the remaining two females.</p><p><b>[5]</b> Technology, such as in vitro fertilization, [Q69] offers a potential path to saving the subspecies. The story of Sudan reminds us that we bear a [Q70] profound responsibility for the survival of other species on this planet.</p>",
      qs: [
        {n:61, t:"Q61: 'Sudan the last male northern white rhino lived at the Ol Pejeta Conservancy.' How should this sentence be punctuated?", opts:["A) Sudan the last male northern white rhino, lived","B) Sudan, the last male northern white rhino, lived","C) Sudan, the last male northern white rhino lived","D) Sudan the last male northern white rhino lived"], ans:"B", expl:"'The last male northern white rhino' is an appositive — a noun phrase that renames Sudan. Appositives must be set off by commas on BOTH sides.", hint:"Grammar rule: Appositives need commas on BOTH sides. Test it: remove the phrase — 'Sudan lived at the Ol Pejeta Conservancy.' Still makes sense? Yes. So the phrase is non-essential and needs a comma BEFORE and AFTER it: 'Sudan, [the last male northern white rhino], lived...'"},
        {n:62, t:"Q62: Which transition best connects Sudan's death to the statement that it marked 'a devastating milestone'?", opts:["A) NO CHANGE — However,","B) Therefore,","C) Additionally,","D) Similarly,"], ans:"A", expl:"'However' signals a shift or an unexpected additional dimension. Sudan died — that's one thing. But his death also marked a devastating milestone for an entire species.", hint:"Grammar rule: Transition logic. The previous sentence stated Sudan died (a fact). This sentence says his death marked a 'devastating milestone' (a larger, more significant meaning). That added layer of significance is a CONTRAST to the plain fact — use HOWEVER to signal that shift in weight."},
        {n:63, t:"Q63: 'In his final years, Sudan ______ considered an ambassador for his species.'", opts:["A) is","B) was","C) has been","D) will be"], ans:"B", expl:"Sudan is deceased — established in Sentence 1. All descriptions of his life must use past tense: 'was considered.'", hint:"Grammar rule: Tense must match reality. Sentence 1 tells us Sudan DIED in 2018. He no longer exists. Therefore every description of his life uses past tense. 'Is considered' (present) implies he is still alive — factually wrong. 'Was considered' = correct past tense."},
        {n:64, t:"Q64: 'Sudan drew international attention to the ______ state of wildlife conservation worldwide.'", opts:["A) Shaky","B) Tentative","C) Precarious","D) Fickle"], ans:"C", expl:"'Precarious' means dangerously unstable and uncertain — perfect for a species on the verge of extinction. 'Shaky' is too informal. 'Tentative' means hesitant. 'Fickle' means changeable.", hint:"Grammar rule: Word precision for academic writing. Eliminate wrong answers: SHAKY = informal, not academic. TENTATIVE = hesitant/provisional (describes decisions or people, not ecological conditions). FICKLE = changeable preferences (applies to people). PRECARIOUS = dangerously unstable — exactly right for a species with two members left."},
        {n:65, t:"Q65: 'The population declined primarily due to poaching and habitat destruction. [BLANK] scientists have not given up hope.' How should these be joined?", opts:["A) and","B) but","C) extinction; however,","D) extinction, however,"], ans:"C", expl:"Two independent clauses joined with contrast need a semicolon + conjunctive adverb + comma: 'destruction; however, scientists…'", hint:"Grammar rule: Semicolons + conjunctive adverbs. When HOWEVER connects two full sentences (independent clauses), the pattern is: [sentence 1]; however, [sentence 2]. Option D uses only a comma before 'however' — that is a COMMA SPLICE, which is a grammatical error. A semicolon is required."},
        {n:66, t:"Q66: 'The loss of ______ species serves as a powerful reminder of the consequences of human activity.'", opts:["A) NO CHANGE — the","B) these","C) those","D) a"], ans:"A", expl:"'The species' refers back to the specific northern white rhino subspecies discussed throughout. The definite article 'the' correctly refers to a specific, already-identified noun.", hint:"Grammar rule: Definite vs. indefinite articles. 'THE' = specific, already known. 'A' = any one, not specific. 'These/Those' = pointing to something nearby. We've been talking about ONE specific species (the northern white rhino) for the entire passage. Use THE to refer back to it."},
        {n:67, t:"Q67: 'The future of ______ biodiversity depends on the choices made today.'", opts:["A) the planets","B) the planet's","C) planets'","D) planets"], ans:"B", expl:"One planet (Earth), so singular possessive is needed: planet's (apostrophe BEFORE the s).", hint:"Grammar rule: Singular possessives. We are talking about ONE planet — Earth. Singular possessive = add apostrophe + s: planet's. 'The planets'' (with apostrophe after s) would mean multiple planets. 'Planets' (no apostrophe) is just a plural noun — no possession shown. We need: the biodiversity OF THE PLANET = the planet's biodiversity."},
        {n:68, t:"Q68: 'Conservationists are working to preserve the genetic material of the remaining two females [for future reproductive efforts / for the purpose of making future reproductive efforts possible / DELETE].'", opts:["A) for future reproductive efforts","B) for the purpose of making future reproductive efforts possible","C) in order that future reproductive efforts may be undertaken","D) DELETE the underlined portion"], ans:"A", expl:"The shortest, clearest option is always preferred when all choices convey the same meaning.", hint:"Grammar rule: Conciseness. All four options say the same thing. On CLT grammar, SHORTER IS ALWAYS BETTER when the meaning is identical. 'For future reproductive efforts' (4 words) says exactly what B, C, and the longer versions say — just without the wordiness. Pick the shortest."},
        {n:69, t:"Q69: 'Technology, such as in vitro fertilization, ______ a potential path to saving the subspecies.'", opts:["A) NO CHANGE — offers","B) offer","C) are offering","D) have offered"], ans:"A", expl:"The subject is 'Technology' — singular. Singular subjects take singular verbs: 'offers.'", hint:"Grammar rule: Don't be fooled by intervening phrases. The subject is 'Technology' (singular). The phrase 'such as in vitro fertilization' is PARENTHETICAL — set off by commas, not the subject. Cross it out: 'Technology _____ a potential path.' Singular = offers. NEVER let a phrase between commas trick you into using the wrong verb form."},
        {n:70, t:"Q70: 'The story of Sudan reminds us that we bear a ______ responsibility for the survival of other species.'", opts:["A) NO CHANGE — profound","B) very deep and serious","C) extremely meaningful and weighty","D) heavily significant"], ans:"A", expl:"'Profound' is the precise, formal, single word for deep moral weight. Options B, C, D are all wordy ways of saying the same thing.", hint:"Grammar rule: One precise word beats multiple vague ones. PROFOUND = deep and serious moral weight (one word). Option B uses THREE words to say the same thing. Options C and D pile on even more words. CLT always rewards precise, concise vocabulary over wordy alternatives."}
      ]
    }
  ]

      qs: [
        {n:71, t:"Two parallel lines cut by a transversal. One consecutive interior angle is 115°. What is x, the other consecutive interior angle?", opts:["A) 55°","B) 65°","C) 75°","D) 115°"], ans:"B", expl:"Consecutive interior angles (same side of transversal, between parallel lines) are SUPPLEMENTARY — they add to 180°. So: x + 115 = 180, therefore x = 65.", hint:"Key rule: Consecutive interior angles between parallel lines ADD TO 180. Step: 180 - 115 = 65. Draw it out — the two angles form a straight line together on one side of the transversal."},
        {n:72, t:"If 2x + y = 10 and x - y = 2, what is the value of x?", opts:["A) 3","B) 4","C) 5","D) 6"], ans:"B", expl:"Use ELIMINATION. Add both equations: (2x+y) + (x-y) = 10+2. The y terms cancel: 3x = 12, so x = 4.", hint:"Step by step: Write both equations. Add them straight down: 2x+x = 3x, y+(-y) = 0, 10+2 = 12. So 3x = 12, x = 4. The y's cancel perfectly — that's why elimination works here."},
        {n:73, t:"A recipe calls for 2.5 cups of flour for every 1 cup of sugar. How many cups of flour for 3 cups of sugar?", opts:["A) 5","B) 6","C) 7.5","D) 8"], ans:"C", expl:"Set up a proportion: 2.5/1 = x/3, so x = 2.5 x 3 = 7.5.", hint:"Unit rate method: If 1 cup sugar needs 2.5 cups flour, then 3 cups sugar needs 3 x 2.5. Multiply: 3 x 2 = 6, 3 x 0.5 = 1.5, total = 7.5."},
        {n:74, t:"If 25% of a number is 20, what is 10% of that same number?", opts:["A) 8","B) 10","C) 12","D) 16"], ans:"A", expl:"Step 1: Find the whole. 25% = 1/4, so if 1/4 of the number = 20, the whole = 20 x 4 = 80. Step 2: 10% of 80 = 8.", hint:"Two steps: (1) 25% means divide by 4. If the result is 20, reverse it: multiply by 4. 20 x 4 = 80. (2) Now find 10% of 80: move decimal one place left = 8."},
        {n:75, t:"What is the area of a triangle with base 10 and height 6?", opts:["A) 60","B) 30","C) 16","D) 32"], ans:"B", expl:"Area = (1/2) x base x height = (1/2) x 10 x 6 = 30.", hint:"Formula: Area = (1/2) x b x h. Plug in: (1/2) x 10 x 6 = 5 x 6 = 30. Remember: a triangle is exactly HALF of a rectangle with the same base and height. Rectangle would be 60 — triangle is 30."},
        {n:76, t:"Simplify: 3(x + 2) - 2(x - 1)", opts:["A) x + 4","B) x + 5","C) x + 6","D) x + 8"], ans:"D", expl:"Distribute: 3(x+2) = 3x+6. Then -2(x-1) = -2x+2. Combine: x + 8.", hint:"Key step: -2(x-1). Negative times negative = positive. So -2 x -1 = +2, not -2. Full work: 3x+6-2x+2 = (3x-2x) + (6+2) = x + 8. Watch that sign carefully!"},
        {n:77, t:"A bag contains 3 red, 5 blue, and 2 green marbles. What is the probability of picking a red marble?", opts:["A) 3/10","B) 1/3","C) 3/5","D) 1/5"], ans:"A", expl:"Probability = favorable outcomes / total outcomes = 3/10.", hint:"Count carefully: Total = 3+5+2 = 10. Red = 3. Probability = 3/10. Don't simplify further — 3 and 10 share no common factors. The answer is just 3/10."},
        {n:78, t:"If the circumference of a circle is 10pi, what is the area?", opts:["A) 5pi","B) 10pi","C) 25pi","D) 100pi"], ans:"C", expl:"Step 1: C = 2(pi)r, so 10pi = 2(pi)r, giving r = 5. Step 2: Area = pi x r^2 = 25pi.", hint:"Two steps: (1) Find r from circumference: C = 2(pi)r. Divide both sides by 2pi: r = 10pi / 2pi = 5. (2) Area = pi x r^2 = pi x 5^2 = 25pi. Common error: forgetting to SQUARE the radius."},
        {n:79, t:"Which value of x satisfies 3x - 5 > 10?", opts:["A) 3","B) 4","C) 5","D) 6"], ans:"D", expl:"Solve: 3x - 5 > 10, so 3x > 15, so x > 5. Only x=6 is strictly greater than 5.", hint:"Solve the inequality: 3x > 15, x > 5. Now TEST the options: x=3 (no), x=4 (no), x=5 (NO — must be strictly GREATER than 5, not equal), x=6 (YES). Always test the boundary value — x=5 is a trap."},
        {n:80, t:"Find the midpoint between (2, 4) and (6, 10).", opts:["A) (3, 6)","B) (4, 7)","C) (4, 8)","D) (5, 7)"], ans:"B", expl:"Midpoint = average the x-coordinates and y-coordinates: x=(2+6)/2=4, y=(4+10)/2=7.", hint:"Formula: Midpoint = (average of x's, average of y's). x: (2+6)/2 = 8/2 = 4. y: (4+10)/2 = 14/2 = 7. Answer: (4,7). Do BOTH coordinates — only doing x is a common mistake."}
      ]

    {
      title: "Geometry, Functions & Probability",

      txt: "<p>Work carefully. Write out each step on scratch paper. No calculator allowed.</p>",
      qs: [
        {n:81, t:"If f(x) = x^2 - 3x, what is f(5)?", opts:["A) 5","B) 8","C) 10","D) 15"], ans:"C", expl:"Substitute x=5: f(5) = (5)^2 - 3(5) = 25 - 15 = 10.", hint:"Function rule: Replace EVERY x with 5. f(5) = (5)^2 - 3(5) = 25 - 15 = 10. Two-step arithmetic: 5 squared = 25, and 3 times 5 = 15. Then 25 - 15 = 10."},
        {n:82, t:"A cylinder has radius 3 and height 10. What is its volume?", opts:["A) 30pi","B) 60pi","C) 90pi","D) 270pi"], ans:"C", expl:"Volume = pi x r^2 x h = pi x 9 x 10 = 90pi.", hint:"Formula: V = pi x r^2 x h. Plug in: pi x (3^2) x 10 = pi x 9 x 10 = 90pi. Warning: use RADIUS (3), not diameter (6). Using diameter gives 360pi — a common wrong answer."},
        {n:83, t:"A car travels 180 miles in 3 hours. How far will it travel in 5 hours at the same speed?", opts:["A) 300","B) 270","C) 320","D) 280"], ans:"A", expl:"Speed = 180/3 = 60 mph. Distance = 60 x 5 = 300 miles.", hint:"Rate x Time = Distance. Step 1: Find rate: 180/3 = 60 mph. Step 2: Multiply new time: 60 x 5 = 300. Or use proportion: 180/3 = x/5, cross-multiply: 3x = 900, x = 300."},
        {n:84, t:"Express 0.00045 in scientific notation.", opts:["A) 4.5 x 10^-3","B) 4.5 x 10^-4","C) 45 x 10^-5","D) 0.45 x 10^-3"], ans:"B", expl:"Move the decimal right 4 places to get 4.5. Since original < 1, exponent is -4: 4.5 x 10^-4.", hint:"Steps: (1) Move decimal until you get a number between 1-10: 0.00045 becomes 4.5 (moved 4 places RIGHT). (2) Since you moved RIGHT (number < 1), exponent is NEGATIVE: 10^-4. Answer: 4.5 x 10^-4. Check: only option B has both the correct coefficient AND correct exponent."},
        {n:85, t:"Find the slope of the line through (1, 2) and (3, 8).", opts:["A) 2","B) 1/3","C) 4","D) 3"], ans:"D", expl:"Slope = (y2-y1)/(x2-x1) = (8-2)/(3-1) = 6/2 = 3.", hint:"Formula: slope = rise/run = (change in y)/(change in x). Pick either point as 'point 1.' (8-2)/(3-1) = 6/2 = 3. Always: y-difference on TOP, x-difference on BOTTOM. Never flip."},
        {n:86, t:"You flip a coin and roll a 6-sided die. What is the probability of getting heads AND a 4?", opts:["A) 1/12","B) 1/6","C) 1/3","D) 1/2"], ans:"A", expl:"For independent events, multiply: P(heads) x P(rolling 4) = 1/2 x 1/6 = 1/12.", hint:"Key rule: AND = MULTIPLY probabilities. P(heads) = 1/2. P(rolling a 4 on a 6-sided die) = 1/6. Multiply: 1/2 x 1/6 = 1/12. These are independent events (coin flip doesn't affect die roll), so multiplication applies."},
        {n:87, t:"A right triangle has legs of 5 and 12. What is the length of the hypotenuse?", opts:["A) 10","B) 13","C) 15","D) 17"], ans:"B", expl:"a^2 + b^2 = c^2: 25 + 144 = 169. Square root of 169 = 13.", hint:"Formula: a^2 + b^2 = c^2. Plug in: 5^2 + 12^2 = 25 + 144 = 169. What number squared = 169? 13 x 13 = 169. Answer: 13. Memorize the 5-12-13 Pythagorean triple — it appears often on standardized tests."},
        {n:88, t:"Two angles are supplementary. One angle is 72 degrees. What is the other?", opts:["A) 18 degrees","B) 28 degrees","C) 108 degrees","D) 118 degrees"], ans:"C", expl:"Supplementary angles sum to 180 degrees: 180 - 72 = 108.", hint:"Memory trick: Supplementary = Straight line = 180. (Complementary = Corner = 90.) So: 180 - 72 = 108. Check: 72 + 108 = 180. Correct!"},
        {n:89, t:"Solve |x - 4| = 9.", opts:["A) 5 only","B) 13 only","C) -5 only","D) 13 and -5"], ans:"D", expl:"Two cases: x-4 = 9 gives x=13. x-4 = -9 gives x=-5. Both are valid.", hint:"Absolute value rule: ALWAYS split into two equations. Case 1: x-4 = +9, so x = 13. Case 2: x-4 = -9, so x = -5. Verify both: |13-4| = |9| = 9 ✓ and |-5-4| = |-9| = 9 ✓. NEVER forget the negative case!"},
        {n:90, t:"$1,000 is invested at 5% simple interest per year. How much interest is earned after 2 years?", opts:["A) $50","B) $100","C) $150","D) $200"], ans:"B", expl:"I = P x r x t = 1000 x 0.05 x 2 = $100.", hint:"Formula: I = Prt. P = principal = $1000. r = rate = 5% = 0.05. t = time = 2 years. Calculate: 1000 x 0.05 = $50 per year. Times 2 years = $100. Simple interest does NOT compound — same $50 each year."}
      ]
